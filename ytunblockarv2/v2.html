let historyStack = [];

function toggleSidebar() {
  sidebar.classList.toggle('hidden');
  mainContent.classList.toggle('expanded');
}

function backToHome() {
  clearAllViews();
  loadTrending();
  historyStack = [];
  pushHistory({page: 'home'});
}

function clearAllViews() {
  videoGrid.innerHTML = '';
  instructions.style.display = 'block';
  playerContainer.classList.remove('active');
  channelContainer.style.display = 'none';
  playlistContainer.style.display = 'none';
  videoGrid.style.display = 'grid';
}

function backToPrevious() {
  if (historyStack.length <= 1) return;
  historyStack.pop();
  const lastState = historyStack[historyStack.length - 1];
  loadState(lastState, false);
}

function pushHistory(state) {
  historyStack.push(state);
  window.history.pushState(state, '', '');
}

window.onpopstate = () => {
  if (historyStack.length > 1) {
    historyStack.pop();
    const state = historyStack[historyStack.length - 1];
    loadState(state, false);
  } else {
    backToHome();
  }
}

function loadState(state, push = true) {
  if (!state) return;
  clearAllViews();
  switch(state.page) {
    case 'home':
      loadTrending();
      break;
    case 'search':
      performSearch(state.query, push);
      break;
    case 'video':
      loadVideo(state.videoId, push);
      break;
    case 'channel':
      loadChannel(state.channelId, push);
      break;
    case 'playlist':
      loadPlaylist(state.playlistId, push);
      break;
  }
}

async function fetchJSON(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
  return res.json();
}

function formatDuration(duration) {
  // duration is ISO 8601 like PT4M13S
  const match = duration.match(/PT(\d+H)?(\d+M)?(\d+S)?/);
  let h = match[1] ? parseInt(match[1]) : 0;
  let m = match[2] ? parseInt(match[2]) : 0;
  let s = match[3] ? parseInt(match[3]) : 0;
  const pad = n => (n < 10 ? '0'+n : n);
  if(h) return `${h}:${pad(m)}:${pad(s)}`;
  return `${m}:${pad(s)}`;
}

function abbreviateNumber(value) {
  if (value < 1000) return value;
  const suffixes = ["", "K", "M", "B","T"];
  const suffixNum = Math.floor( (""+value).length/3 );
  let shortValue = parseFloat( (suffixNum != 0 ? (value / Math.pow(1000,suffixNum)) : value).toPrecision(2));
  if (shortValue % 1 != 0) {
    shortValue = shortValue.toFixed(1);
  }
  return shortValue+suffixes[suffixNum];
}

// Detect if input is a YouTube URL and type (video, channel, playlist)
function parseYouTubeURL(url) {
  try {
    const u = new URL(url);
    if (!['www.youtube.com','youtube.com','youtu.be','music.youtube.com'].includes(u.hostname)) return null;
    if (u.hostname === 'youtu.be') {
      const videoId = u.pathname.slice(1);
      if (videoId) return {type: 'video', id: videoId};
    }
    // www.youtube.com or music.youtube.com
    const params = u.searchParams;
    if (params.get('v')) return {type: 'video', id: params.get('v')};
    if (params.get('list')) {
      // Could be playlist or a video in playlist
      if (u.pathname.includes('/playlist')) {
        return {type: 'playlist', id: params.get('list')};
      }
      // Could be a video URL with list param, treat playlist view as well
      // We'll treat list param as playlist anyway
      return {type: 'playlist', id: params.get('list')};
    }
    if (u.pathname.startsWith('/channel/')) {
      return {type: 'channel', id: u.pathname.split('/')[2]};
    }
    if (u.pathname.startsWith('/user/')) {
      return {type: 'channel', id: u.pathname.split('/')[2]};
    }
    if (u.pathname.startsWith('/c/')) {
      return {type: 'channel', id: u.pathname.split('/')[2]};
    }
  } catch {
    return null;
  }
  return null;
}

async function performSearch(queryInput, push = true) {
  const query = queryInput || searchInput.value.trim();
  if (!query) return;

  clearAllViews();
  instructions.style.display = 'none';

  // Detect if query is URL of video/channel/playlist
  const urlType = parseYouTubeURL(query);

  if (urlType) {
    if (urlType.type === 'video') {
      loadVideo(urlType.id, push);
    } else if (urlType.type === 'channel') {
      loadChannel(urlType.id, push);
    } else if (urlType.type === 'playlist') {
      loadPlaylist(urlType.id, push);
    }
    return;
  }

  // Normal search for videos/channels/playlists by query
  videoGrid.style.display = 'grid';
  videoGrid.innerHTML = `<div class="loading">Loading results for "${query}"...</div>`;

  if(push) pushHistory({page:'search', query});

  // Search: videos, channels, playlists
  // We'll do a combined search then filter and display by type

  try {
    const searchURL = `https://youtube.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query)}&maxResults=24&key=${API_KEY}`;
    const data = await fetchJSON(searchURL);
    if (!data.items || data.items.length === 0) {
      videoGrid.innerHTML = `<div class="instructions">No results found for "${query}".</div>`;
      return;
    }

    videoGrid.innerHTML = '';

    for (const item of data.items) {
      if(item.id.kind === 'youtube#video') {
        addVideoCard(item);
      } else if(item.id.kind === 'youtube#channel') {
        addChannelCard(item);
      } else if(item.id.kind === 'youtube#playlist') {
        addPlaylistCard(item);
      }
    }

  } catch (e) {
    videoGrid.innerHTML = `<div class="instructions">Error loading search results: ${e.message}</div>`;
  }
}

function addVideoCard(item) {
  const videoId = item.id.videoId;
  const snippet = item.snippet;
  const thumbnail = snippet.thumbnails.medium.url;
  const title = snippet.title;
  const channelTitleText = snippet.channelTitle;

  // We need video details for duration (need to fetch)
  fetchVideoDetails(videoId).then(videoDetails => {
    const duration = videoDetails ? videoDetails.contentDetails.duration : null;
    const durationFormatted = duration ? formatDurationISO8601(duration) : '';
    const channelId = videoDetails ? videoDetails.snippet.channelId : null;

    const card = document.createElement('div');
    card.className = 'video-card';
    card.onclick = () => loadVideo(videoId);

    card.innerHTML = `
      <div class="video-thumbnail-container">
        <img class="video-thumbnail" src="${thumbnail}" alt="${title}" />
        <div class="video-duration">${durationFormatted}</div>
      </div>
      <div class="video-info">
        <img class="channel-avatar" src="https://yt3.ggpht.com/ytc/AMLnZu_DWfk7C59LRcZKs14x27q1rQ0Dr5W9hB6IMw=s88-c-k-c0x00ffffff-no-rj" alt="Channel Avatar" />
        <div class="video-details">
          <div class="video-title">${title}</div>
          <div class="video-metadata channel-name">${channelTitleText}</div>
        </div>
      </div>
    `;
    videoGrid.appendChild(card);
  });
}

function addChannelCard(item) {
  const channelId = item.id.channelId;
  const snippet = item.snippet;
  const title = snippet.title;
  const thumbnail = snippet.thumbnails.default.url;

  const card = document.createElement('div');
  card.className = 'video-card';
  card.onclick = () => loadChannel(channelId);

  card.innerHTML = `
    <div class="video-thumbnail-container">
      <img class="video-thumbnail" src="${thumbnail}" alt="${title}" style="border-radius: 50%;"/>
    </div>
    <div class="video-info">
      <div class="video-details">
        <div class="video-title">${title}</div>
      </div>
    </div>
  `;
  videoGrid.appendChild(card);
}

function addPlaylistCard(item) {
  const playlistId = item.id.playlistId;
  const snippet = item.snippet;
  const title = snippet.title;
  const channelTitleText = snippet.channelTitle;
  const thumbnail = snippet.thumbnails.medium?.url || '';

  const card = document.createElement('div');
  card.className = 'video-card';
  card.onclick = () => loadPlaylist(playlistId);

  card.innerHTML = `
    <div class="video-thumbnail-container">
      <img class="video-thumbnail" src="${thumbnail}" alt="${title}" />
    </div>
    <div class="video-info">
      <div class="video-details">
        <div class="video-title">${title}</div>
        <div class="video-metadata channel-name">${channelTitleText}</div>
      </div>
    </div>
  `;
  videoGrid.appendChild(card);
}

async function fetchVideoDetails(videoId) {
  try {
    const url = `https://youtube.googleapis.com/youtube/v3/videos?part=snippet,contentDetails&id=${videoId}&key=${API_KEY}`;
    const data = await fetchJSON(url);
    if(data.items && data.items.length > 0) return data.items[0];
  } catch {}
  return null;
}

function formatDurationISO8601(iso) {
  // ISO 8601 duration like PT4M13S, convert to mm:ss or hh:mm:ss
  let match = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if (!match) return "";
  const hours = parseInt(match[1] || 0, 10);
  const minutes = parseInt(match[2] || 0, 10);
  const seconds = parseInt(match[3] || 0, 10);
  const pad = n => (n < 10 ? '0'+n : n);
  if (hours > 0) return `${hours}:${pad(minutes)}:${pad(seconds)}`;
  else return `${minutes}:${pad(seconds)}`;
}

async function loadVideo(videoId, push = true) {
  clearAllViews();
  playerContainer.classList.add('active');
  videoGrid.style.display = 'none';
  instructions.style.display = 'none';

  if(push) pushHistory({page:'video', videoId});

  try {
    const videoData = await fetchVideoDetails(videoId);
    if(!videoData) throw new Error('Video not found');

    const snippet = videoData.snippet;
    playerTitle.textContent = snippet.title;
    playerChannel.textContent = snippet.channelTitle;

    videoPlayer.src = `https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&rel=0`;
  } catch (e) {
    alert('Error loading video: ' + e.message);
    backToHome();
  }
}

async function loadChannel(channelId, push = true) {
  clearAllViews();
  channelContainer.style.display = 'block';
  videoGrid.style.display = 'none';
  instructions.style.display = 'none';

  if(push) pushHistory({page:'channel', channelId});

  try {
    // Fetch channel details
    let url = `https://youtube.googleapis.com/youtube/v3/channels?part=snippet,statistics&id=${channelId}&key=${API_KEY}`;
    let data = await fetchJSON(url);
    if(!data.items || data.items.length === 0) throw new Error('Channel not found');
    let channel = data.items[0];

    channelAvatar.src = channel.snippet.thumbnails.high?.url || '';
    channelTitle.textContent = channel.snippet.title;
    channelSubscribers.textContent = `${abbreviateNumber(channel.statistics.subscriberCount)} subscribers`;
    channelDescription.textContent = channel.snippet.description;

    // Fetch channel uploads playlist id
    const uploadsPlaylistId = channel.contentDetails?.relatedPlaylists?.uploads;
    if (!uploadsPlaylistId) {
      // fallback search videos by channel id
      loadChannelVideos(channelId);
    } else {
      loadPlaylist(uploadsPlaylistId, false, channelId, true);
    }
  } catch(e) {
    alert('Error loading channel: ' + e.message);
    backToHome();
  }
}

async function loadChannelVideos(channelId) {
  try {
    const url = `https://youtube.googleapis.com/youtube/v3/search?part=snippet&channelId=${channelId}&maxResults=24&order=date&type=video&key=${API_KEY}`;
    const data = await fetchJSON(url);
    channelUploads.innerHTML = '';
    if(data.items) {
      for (const item of data.items) {
        addVideoCard(item);
      }
    }
  } catch {
    channelUploads.innerHTML = '<div class="instructions">Failed to load channel videos.</div>';
  }
}

async function loadPlaylist(playlistId, push = true, channelId=null, isUploadsPlaylist=false) {
  clearAllViews();
  playlistContainer.style.display = 'block';
  videoGrid.style.display = 'none';
  instructions.style.display = 'none';

  if(push) pushHistory({page:'playlist', playlistId});

  try {
    // Fetch playlist details (title, description, channel)
    const plURL = `https://youtube.googleapis.com/youtube/v3/playlists?part=snippet&id=${playlistId}&key=${API_KEY}`;
    const plData = await fetchJSON(plURL);
    if(!plData.items || plData.items.length === 0) throw new Error('Playlist not found');
    const playlist = plData.items[0].snippet;

    playlistTitle.textContent = playlist.title;
    playlistDescription.textContent = playlist.description || '';
    playlistChannel.textContent = playlist.channelTitle;

    // Fetch playlist videos
    let videos = [];
    let nextPageToken = '';
    do {
      const plItemsURL = `https://youtube.googleapis.com/youtube/v3/playlistItems?part=snippet,contentDetails&playlistId=${playlistId}&maxResults=50&pageToken=${nextPageToken}&key=${API_KEY}`;
      const plItemsData = await fetchJSON(plItemsURL);
      videos = videos.concat(plItemsData.items);
      nextPageToken = plItemsData.nextPageToken || '';
    } while (nextPageToken);

    playlistVideoList.innerHTML = '';
    for(const item of videos) {
      const vidId = item.contentDetails.videoId;
      const snip = item.snippet;

      // Get video duration
      let duration = '';
      try {
        const videoDetails = await fetchVideoDetails(vidId);
        duration = videoDetails ? formatDurationISO8601(videoDetails.contentDetails.duration) : '';
      } catch {}

      const videoItem = document.createElement('div');
      videoItem.className = 'playlist-video-item';
      videoItem.onclick = () => loadVideo(vidId);

      videoItem.innerHTML = `
        <img class="playlist-video-thumbnail" src="${snip.thumbnails.medium?.url || ''}" alt="${snip.title}">
        <div class="playlist-video-info">
          <div class="playlist-video-title">${snip.title}</div>
          <div class="playlist-video-channel">${snip.videoOwnerChannelTitle || ''} ${duration ? '• '+duration : ''}</div>
        </div>
      `;
      playlistVideoList.appendChild(videoItem);
    }

  } catch(e) {
    alert('Error loading playlist: ' + e.message);
    backToHome();
  }
}

function handleSearchKey(e) {
  if (e.key === 'Enter') {
    performSearch();
  }
}

function openInYoutube() {
  const videoId = historyStack.length ? (historyStack[historyStack.length - 1].videoId || '') : '';
  if (videoId) {
    window.open(`https://www.youtube.com/watch?v=${videoId}`, '_blank');
  }
}

// Load trending videos on startup
async function loadTrending() {
  clearAllViews();
  videoGrid.style.display = 'grid';
  instructions.style.display = 'none';
  videoGrid.innerHTML = '<div class="loading">Loading trending videos...</div>';

  try {
    const url = `https://youtube.googleapis.com/youtube/v3/videos?part=snippet,contentDetails&chart=mostPopular&maxResults=24&regionCode=US&key=${API_KEY}`;
    const data = await fetchJSON(url);
    videoGrid.innerHTML = '';
    for (const item of data.items) {
      addVideoCard({id: {videoId: item.id}, snippet: item.snippet});
    }
  } catch(e) {
    videoGrid.innerHTML = `<div class="instructions">Error loading trending videos: ${e.message}</div>`;
  }
}

// Setup chips filtering by category for quick searches
chipsContainer.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    chipsContainer.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    let category = chip.dataset.type;
    if(category === 'all') {
      backToHome();
    } else {
      performSearch(category);
    }
  });
});

// Init
backToHome();

</script>
