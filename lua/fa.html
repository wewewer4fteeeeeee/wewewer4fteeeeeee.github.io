<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Exploding Game Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet" />
    <style>
        html, body { margin: 0; padding: 0; height: 100%; background-color: rgb(20, 20, 20); color: white; font-family: 'Nunito', sans-serif; overflow: hidden; }
        body, #launcher-container { height: 100vh; display: flex; flex-direction: column; }
        #launcher-container { max-width: 900px; margin: 0 auto; padding: 20px; box-sizing: border-box; flex-grow: 1; }
        
        #top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        #top-bar h1 { margin: 0; font-weight: 700; font-size: 28px; color: #5865F2; user-select: none; }
        
        #cloakHistoryBtn { background: #5865F2; border: none; border-radius: 12px; padding: 10px 16px; color: white; font-weight: 700; cursor: pointer; user-select: none; transition: background-color 0.3s ease, transform 0.2s ease; }
        #cloakHistoryBtn:hover { background: #4752c4; transform: scale(1.05); }

        #tab-buttons { display: flex; gap: 5px; justify-content: center; margin-bottom: 10px; }
        .tab-button { background-color: rgb(35, 35, 35); color: white; border: 1px solid rgb(50, 50, 50); padding: 10px 20px; cursor: pointer; border-bottom: none; border-radius: 4px 4px 0 0; transition: background-color 0.2s; user-select: none; font-weight: 700; }
        .tab-button:hover { background-color: rgb(45, 45, 45); }
        .tab-button.active { background-color: rgb(20, 20, 20); border: 1px solid rgb(50, 50, 50); border-bottom: 1px solid transparent; }

        #games-container { flex-grow: 1; display: flex; flex-direction: column; border: 1px solid rgb(50, 50, 50); border-radius: 6px; background-color: rgb(30, 30, 30); overflow: hidden; }
        .tab-content { flex-grow: 1; display: none; overflow-y: auto; padding: 15px; }
        .tab-content.active { display: block; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        
        button.game-button { background-color: rgb(45, 45, 45); color: white; border-radius: 6px; outline: none; border: 2px solid rgb(45, 45, 45); padding: 20px; font-size: 16px; cursor: pointer; transition: background-color 0.2s, border-color 0.2s, transform 0.2s; text-align: center; word-wrap: break-word; user-select: none; }
        button.game-button:hover { background-color: rgb(25, 25, 25); border-color: rgba(255, 255, 255, 0.2); transform: scale(1.05); }

        /* Fullscreen Overlay Styles */
        #game-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: black;
            display: none; /* Hidden by default */
            z-index: 9999;
            flex-direction: column;
        }
        #game-overlay iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        #close-game {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255,0,0,0.7);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            z-index: 10000;
        }
        #close-game:hover { background: red; }
    </style>
</head>
<body>

    <!-- Fullscreen Iframe Container -->
    <div id="game-overlay">
        <button id="close-game" onclick="closeGame()">Close Game</button>
        <iframe id="game-iframe" src=""></iframe>
    </div>

    <div id="launcher-container">
        <div id="top-bar">
            <h1>Exploding Game Hub</h1>
            <button id="cloakHistoryBtn">Cloak History</button>
        </div>
        <div id="tab-buttons">
            <button class="tab-button active" onclick="showCategory('All')">All</button>
            <button class="tab-button" onclick="showCategory('Gun Games')">Gun Games</button>
            <button class="tab-button" onclick="showCategory('Strat Games')">Strat Games</button>
            <button class="tab-button" onclick="showCategory('Unblocked Stuff')">Unblocked Stuff</button>
            <button class="tab-button" onclick="showCategory('Stick Man Games')">Stick Man Games</button>
            <button class="tab-button" onclick="showCategory('Random Stuff')">Random Stuff</button>
        </div>
        <div id="games-container">
            <div id="tab-All" class="tab-content active"><div id="menu-All" class="menu-grid"></div></div>
            <div id="tab-Gun Games" class="tab-content"><div id="menu-Gun Games" class="menu-grid"></div></div>
            <div id="tab-Strat Games" class="tab-content"><div id="menu-Strat Games" class="menu-grid"></div></div>
            <div id="tab-Unblocked Stuff" class="tab-content"><div id="menu-Unblocked Stuff" class="menu-grid"></div></div>
            <div id="tab-Stick Man Games" class="tab-content"><div id="menu-Stick Man Games" class="menu-grid"></div></div>
            <div id="tab-Random Stuff" class="tab-content"><div id="menu-Random Stuff" class="menu-grid"></div></div>
        </div>
    </div>

    <script>
        const buttons = [
            { name: "GunBlood", url: "https://cbgamesdev.github.io/chilibowlflash/gunblood.html", category: "Gun Games" },
            { name: "Geometry dash", url: "https://wewewer4fteeeeeee.github.io/gammess/Geometry%20Dash%20Lite.html", category: "Strat Games" },
            { name: "Granny", url: "https://wewewer4fteeeeeee.github.io/gammess/Granny", category: "Strat Games" },
            { name: "run 3", url: "https://cbgamesdev.github.io/chilibowlflash/run3/index.html", category: "Random Stuff" },
            { name: "Stick Man Goon", url: "https://stickmanhook2.org/game/stickman-hook/", category: "Stick Man Games" },
            { name: "Vex", url: "https://wewewer4fteeeeeee.github.io/gammess/vex.html", category: "Stick Man Games" },
            { name: "Block Blast", url: "https://cbgamesdev.github.io/chilibowlflash/blockblast/index.html", category: "Strat Games" },
            { name: "MineCraft Tower Defense", url: "https://wewewer4fteeeeeee.github.io/gammess/minecraftdih.html", category: "Random Stuff" },
            { name: "Learn To Fly 2", url: "https://wewewer4fteeeeeee.github.io/gammess/learn2goon.html", category: "Strat Games" },
            { name: "Portal Flash", url: "https://wewewer4fteeeeeee.github.io/gammess/Portal.html", category: "Random Stuff" },
            { name: "Age Of War", url: "https://wewewer4fteeeeeee.github.io/gammess/ageofsum.html", category: "Strat Games" },
            { name: "Meat Boy", url: "https://wewewer4fteeeeeee.github.io/gammess/meatjerk.html", category: "Strat Games" },
            { name: "SpaceBar Clicker", url: "https://wewewer4fteeeeeee.github.io/gammess/spacebargooner.html", category: "Random Stuff" },
            { name: "Slope", url: "https://wewewer4fteeeeeee.github.io/gammess/Slope.html", category: "Strat Games" },
            { name: "Paper.Io 2", url: "https://ubv4l.neocities.org/projects/paperio2/", category: "Strat Games" },
            { name: "Subway Surfers", url: "https://kingedu112.github.io/g26/class-444/", category: "Strat Games" },
            { name: "Gun Spin", url: "https://coolmathsgames.github.io/c/gunspin/", category: "Strat Games" },
            { name: "Hole.io", url: "https://kevin.games/hole/", category: "Strat Games" },
            { name: "1v1 lol", url: "https://1v1lol.gitlab.io/1v1-lol-2/", category: "Strat Games" },
            { name: "Stickman Fight", url: "https://labgstore311.github.io/g50/class-6", category: "Stick Man Games" },
            { name: "ragdoll archers", url: "https://bitlifeonline.github.io/ragdoll-archers/", category: "Stick Man Games" },
            { name: "moto x3m", url: "https://unblocked-games.s3.amazonaws.com/games/2024/gm/moto-x3m/index.html", category: "Strat Games" },
            { name: "yt unblocker", url: "https://wewewer4fteeeeeee.github.io/ytunblockarv2/v2.html", category: "Unblocked Stuff" },
            { name: "Slow roads", url: "https://slowroads.io/", category: "All" },
            { name: "Slow roads modded cause im cool", url: "https://wewewer4fteeeeeee.github.io/labubu/", category: "All" },
            { name: "stickman ragdoll", url: "https://unblocked-games.s3.amazonaws.com/games/stickman-ragdoll/index.html", category: "Stick Man Games" },
            { name: "Google Snake", url: "https://snake-google-online.github.io/file/", category: "Strat Games" }
        ];

        function showCategory(category) {
            const tabButtons = document.querySelectorAll('.tab-button');
            const tabContents = document.querySelectorAll('.tab-content');
            tabButtons.forEach(btn => btn.classList.remove('active'));
            tabContents.forEach(content => content.classList.remove('active'));
            
            // Fix: find the correct button by text content or specific match
            const targetBtn = Array.from(tabButtons).find(b => b.textContent === category);
            if(targetBtn) targetBtn.classList.add('active');
            
            document.getElementById(`tab-${category}`).classList.add('active');
        }

        // NEW FUNCTIONS for Iframe Handling
        function openGame(url) {
            const overlay = document.getElementById('game-overlay');
            const iframe = document.getElementById('game-iframe');
            iframe.src = url;
            overlay.style.display = 'flex';
        }

        function closeGame() {
            const overlay = document.getElementById('game-overlay');
            const iframe = document.getElementById('game-iframe');
            iframe.src = ""; // Stop the game audio/processing
            overlay.style.display = 'none';
        }

        function createButtons() {
            const categories = ["All", "Gun Games", "Strat Games", "Unblocked Stuff", "Stick Man Games", "Random Stuff"];
            categories.forEach(category => {
                let gamesToDisplay = buttons;
                if (category !== "All") {
                    gamesToDisplay = buttons.filter(btnData => btnData.category === category);
                }
                const menu = document.getElementById(`menu-${category}`);
                if (menu) {
                    menu.innerHTML = '';
                    gamesToDisplay.forEach(btnData => {
                        const btn = document.createElement("button");
                        btn.textContent = btnData.name;
                        btn.className = 'game-button';
                        // MODIFIED: Calls openGame instead of window.open
                        btn.onclick = () => openGame(btnData.url);
                        menu.appendChild(btn);
                    });
                }
            });
        }

        document.getElementById('cloakHistoryBtn').onclick = () => {
            const baseUrl = window.location.href.split('#')[0].split('?')[0];
            const tabName = "NO TABS BOZO";
            document.title = tabName;
            for (let i = 1; i <= 1000; i++) {
                const fakeUrl = `${baseUrl}?flood=${i}`;
                history.pushState({}, tabName, fakeUrl);
            }
            alert(`History flood successful! 1000 unique entries added with tab title "${tabName}".`);
        };

        window.onload = createButtons;
    </script>
</body>
</html>
